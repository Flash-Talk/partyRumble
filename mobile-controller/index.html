<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1020" />
  <title>Penalty Rumble — Controller</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #141a2e;
      --ink: #eef1f7;
      --muted: #8b93a7;
      --accent: #64d2ff;
      --slot: #64d2ff; /* overwritten with the player's color on join */
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; height: 100%; width: 100%;
      overflow: hidden; overscroll-behavior: none; touch-action: none;
      user-select: none; -webkit-user-select: none;
      background: var(--bg); color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    body { position: fixed; inset: 0; }

    /* ---- Join overlay ---- */
    #join {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 24px;
      background: radial-gradient(120% 90% at 50% 0%, #182347 0%, var(--bg) 60%);
    }
    #join h1 { margin: 0; font-size: 24px; letter-spacing: 0.5px; }
    #join .sub { color: var(--muted); font-size: 14px; margin-top: -8px; }
    .code-badge {
      font-size: 40px; font-weight: 800; letter-spacing: 8px;
      padding: 10px 20px; border-radius: 14px;
      background: var(--panel); border: 1px solid #263056; color: var(--accent);
    }
    .field { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    input {
      width: 100%; padding: 14px 16px; font-size: 18px; border-radius: 12px;
      border: 1px solid #2a335c; background: #0e1428;
      color: var(--ink); text-align: center;
    }
    input:focus { outline: 2px solid var(--accent); }
    .btn {
      width: 100%; max-width: 320px; padding: 16px; font-size: 20px; font-weight: 700;
      border: none; border-radius: 14px; background: var(--accent); color: #062033;
      cursor: pointer;
    }
    .btn:active { transform: translateY(1px); filter: brightness(0.95); }
    #joinError { color: #ff6b6b; font-size: 14px; min-height: 18px; text-align: center; }

    /* ---- Controller ---- */
    #controller { position: absolute; inset: 0; z-index: 10; display: none; flex-direction: column; }
    #topbar {
      flex: 0 0 auto; display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: rgba(0,0,0,0.25);
    }
    #dot { width: 16px; height: 16px; border-radius: 50%; background: var(--slot); box-shadow: 0 0 10px var(--slot); }
    #slotLabel { font-weight: 700; }
    #status { margin-left: auto; font-size: 13px; color: var(--muted); }
    #status.live { color: #4ade80; }
    #status.warn { color: #fbbf24; }

    #pad { flex: 1 1 auto; display: flex; min-height: 0; }

    /* Joystick zone (left) */
    #joyZone { position: relative; flex: 2 1 0; touch-action: none; }
    #joyHint {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #3a466f; font-size: 15px; letter-spacing: 1px; pointer-events: none;
    }
    #joyBase, #joyKnob { position: absolute; border-radius: 50%; pointer-events: none; display: none; }
    #joyBase {
      width: 180px; height: 180px; margin: -90px 0 0 -90px;
      border: 2px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03);
    }
    #joyKnob {
      width: 84px; height: 84px; margin: -42px 0 0 -42px;
      background: var(--slot); box-shadow: 0 0 24px var(--slot); opacity: 0.9;
    }

    /* Shoot zone (right) */
    #shootZone { flex: 1 1 0; display: flex; align-items: center; justify-content: center; padding: 16px; }
    #shootBtn {
      width: 100%; height: 62%; max-width: 240px; border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; letter-spacing: 2px; color: #071018;
      background: var(--slot); box-shadow: 0 0 40px var(--slot);
      touch-action: none;
    }
    #shootBtn.pressed { filter: brightness(0.85); transform: scale(0.97); }

    .divider { width: 1px; background: rgba(255,255,255,0.06); }

    /* ---- UNO ---- */
    #uno { position: absolute; inset: 0; z-index: 15; display: none; flex-direction: column; background: var(--bg); }
    #unoTop {
      flex: 0 0 auto; display: flex; align-items: center; gap: 14px;
      padding: 10px 14px; background: rgba(0,0,0,0.28);
    }
    #unoTurn { font-size: 20px; font-weight: 800; }
    #unoTurn.your-turn { color: #4ade80; }
    #unoTurn.waiting-turn { color: #8b93a7; }
    #unoPile { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    #unoColor { font-weight: 800; text-transform: uppercase; font-size: 14px; }
    #unoMsg { min-height: 22px; text-align: center; font-size: 15px; font-weight: 700; padding: 3px; color: #8b93a7; }
    #unoMsg.hint { color: #64d2ff; }
    #unoMsg.err { color: #ff6b6b; }

    .card {
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; color: #fff; border-radius: 12px;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.85);
      text-shadow: 0 1px 3px rgba(0,0,0,0.4); user-select: none;
    }
    .card.wildcard { background: conic-gradient(#ef4444 0 25%, #eab308 0 50%, #22c55e 0 75%, #3b82f6 0); }
    /* top-card preview */
    #unoTopCard { width: 54px; height: 76px; font-size: 26px; }

    #unoHand {
      flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; touch-action: pan-y;
      display: flex; flex-wrap: wrap; align-content: flex-start; gap: 10px; padding: 14px; justify-content: center;
    }
    #unoHand .card { width: 74px; height: 104px; font-size: 34px; }
    #unoHand .card.legal { box-shadow: inset 0 0 0 3px #fff, 0 0 0 3px #4ade80, 0 6px 14px rgba(74,222,128,0.35); transform: translateY(-4px); }
    #unoHand .card.illegal { opacity: 0.4; }

    #unoActions { flex: 0 0 auto; display: flex; gap: 10px; padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); }
    .ubtn {
      flex: 1; padding: 16px; font-size: 20px; font-weight: 800; border: none; border-radius: 14px;
      background: #263056; color: #eef1f7;
    }
    .ubtn:disabled { opacity: 0.4; }
    .ubtn.uno { background: #ef4444; color: #fff; }
    .ubtn.accent { background: #f59e0b; color: #1a1206; box-shadow: 0 0 0 3px rgba(245,158,11,0.45); }
    .ubtn:active:not(:disabled) { transform: translateY(1px); filter: brightness(0.95); }

    #colorPicker {
      position: absolute; inset: 0; z-index: 16; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      background: rgba(6,10,22,0.92);
    }
    #colorPicker.show { display: flex; }
    .cp-title { font-size: 24px; font-weight: 800; }
    .cp-row { display: flex; gap: 16px; }
    .cp { width: 84px; height: 120px; border: 3px solid #fff; border-radius: 14px; }
    .cp[data-color="red"] { background: #ef4444; }
    .cp[data-color="yellow"] { background: #eab308; }
    .cp[data-color="green"] { background: #22c55e; }
    .cp[data-color="blue"] { background: #3b82f6; }
    #cpCancel { margin-top: 18px; width: 220px; flex: none; }

    /* ---- Among Us role reveal ---- */
    #amongusRole {
      position: absolute; inset: 0; z-index: 25; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      text-align: center; padding: 24px;
    }
    #amongusRole.show { display: flex; }
    #amongusRole .ar-title { font-size: 60px; font-weight: 900; letter-spacing: 3px; }
    #amongusRole .ar-sub { font-size: 20px; color: #cbd3e6; max-width: 320px; }

    #shootBtn.killready { background: #ef4444; box-shadow: 0 0 40px #ef4444; }

    #amongusVote {
      position: absolute; inset: 0; z-index: 24; display: none; flex-direction: column;
      align-items: center; gap: 10px; padding: 16px calc(16px + env(safe-area-inset-bottom));
      background: var(--bg); overflow-y: auto; touch-action: pan-y;
    }
    #amongusVote.show { display: flex; }
    #avKilled { color: #ff6b6b; font-weight: 800; font-size: 20px; min-height: 22px; text-align: center; }
    #avTitle { font-size: 24px; font-weight: 800; text-align: center; }
    #avTimer { color: #8b93a7; font-size: 16px; }
    #avGrid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 6px; }
    .av-btn {
      width: 92px; height: 92px; border-radius: 16px; border: 3px solid #fff; position: relative;
      display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px;
      font-weight: 800; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .av-btn.skip { background: #263056; }
    .av-btn.voted { outline: 4px solid #4ade80; outline-offset: 2px; }
    .av-count { position: absolute; top: 4px; right: 9px; font-size: 22px; font-weight: 900; }
    #avStatus { margin-top: 8px; font-weight: 700; min-height: 22px; text-align: center; }
    #amongusDead {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 12;
      background: rgba(0,0,0,0.6); color: #ff8f8f; font-weight: 800; padding: 6px 16px;
      border-radius: 10px; display: none;
    }
    #amongusDead.show { display: block; }

    #amongusTasks {
      position: absolute; top: 12px; right: 12px; z-index: 12;
      background: rgba(0,0,0,0.5); color: #4ade80; font-weight: 800; padding: 6px 12px; border-radius: 10px; display: none;
    }
    #shootBtn.taskmode { background: #3b82f6; box-shadow: 0 0 40px #3b82f6; color: #fff; }

    #amongusTask {
      position: absolute; inset: 0; z-index: 26; display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px; background: rgba(6,10,22,0.96);
    }
    #amongusTask.show { display: flex; }
    #atClose { position: absolute; top: 12px; right: 18px; background: none; border: none; color: #eef1f7; font-size: 42px; line-height: 1; }
    #atTitle { font-size: 24px; font-weight: 800; text-align: center; padding: 0 20px; }
    #atArea { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 20px; max-width: 340px; }
    .task-hold {
      width: 170px; height: 170px; border-radius: 50%; background: #3b82f6; color: #fff; font-size: 28px; font-weight: 900;
      display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(59,130,246,0.5); user-select: none;
    }
    .task-barwrap { width: 260px; height: 22px; background: #1a2440; border-radius: 12px; overflow: hidden; }
    .task-fill { width: 0%; height: 100%; background: #4ade80; }
    .task-dot { width: 84px; height: 84px; border-radius: 50%; background: #eab308; border: 3px solid #fff; }
    .task-dot.hit { background: #4ade80; opacity: 0.45; }
  </style>
</head>
<body>
  <!-- Join / lobby overlay -->
  <section id="join">
    <h1>Penalty Rumble</h1>
    <div class="sub">Enter the room shown on the TV</div>

    <div class="field" id="codeField">
      <label>Room code</label>
      <input id="codeInput" maxlength="4" autocapitalize="characters" autocomplete="off"
             inputmode="text" placeholder="ABCD" />
    </div>
    <div class="code-badge" id="codeBadge" style="display:none">----</div>

    <div class="field">
      <label>Your name</label>
      <input id="nameInput" maxlength="12" autocomplete="off" placeholder="Your name" />
    </div>

    <button class="btn" id="joinBtn">JOIN GAME</button>
    <div id="joinError"></div>
  </section>

  <!-- The controller -->
  <section id="controller">
    <div id="topbar">
      <span id="dot"></span>
      <span id="slotLabel">Player</span>
      <span id="status">connecting…</span>
    </div>
    <div id="pad">
      <div id="joyZone">
        <div id="joyHint">DRAG TO MOVE</div>
        <div id="joyBase"></div>
        <div id="joyKnob"></div>
      </div>
      <div class="divider"></div>
      <div id="shootZone">
        <div id="shootBtn">SHOOT</div>
      </div>
    </div>
  </section>

  <!-- UNO card UI (shown only during an UNO round) -->
  <section id="uno">
    <div id="unoTop">
      <span id="unoTurn">—</span>
      <div id="unoPile">
        <div id="unoTopCard" class="card"></div>
        <span id="unoColor"></span>
      </div>
    </div>
    <div id="unoMsg"></div>
    <div id="unoHand"></div>
    <div id="unoActions">
      <button id="unoDraw" class="ubtn">DRAW</button>
      <button id="unoPass" class="ubtn" style="display:none">PASS</button>
      <button id="unoUno" class="ubtn uno" style="display:none">UNO!</button>
    </div>
    <div id="colorPicker">
      <div class="cp-title">Pick a color</div>
      <div class="cp-row">
        <button class="cp" data-color="red"></button>
        <button class="cp" data-color="yellow"></button>
        <button class="cp" data-color="green"></button>
        <button class="cp" data-color="blue"></button>
      </div>
      <button id="cpCancel" class="ubtn">Cancel</button>
    </div>
  </section>

  <!-- Among Us role reveal (shown briefly at the start of a round) -->
  <div id="amongusRole">
    <div class="ar-title"></div>
    <div class="ar-sub"></div>
  </div>

  <!-- Among Us meeting / voting overlay -->
  <section id="amongusVote">
    <div id="avKilled"></div>
    <div id="avTitle">Who is the imposter?</div>
    <div id="avTimer"></div>
    <div id="avGrid"></div>
    <div id="avStatus"></div>
  </section>
  <div id="amongusDead">💀 You're dead — spectating</div>
  <div id="amongusTasks"></div>

  <!-- Among Us task minigame overlay -->
  <section id="amongusTask">
    <button id="atClose" aria-label="Close">×</button>
    <div id="atTitle">TASK</div>
    <div id="atArea"></div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="src/controller.js"></script>
</body>
</html>
